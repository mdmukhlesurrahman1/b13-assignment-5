<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- google font add -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind and daisyui add -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <main class="bg-base-300 h-screen flex justify-center items-center">
        <fieldset
            class="fieldset bg-base-100 border-base-200 rounded-box w-xs p-5 shadow-md">
            <div class="banner text-center justify-items-center">
                <img src="assets/github-logo.png" alt="" class="mb-4">
                <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
                <h3 class="mb-4">Sign in to manage your issues</h3>
            </div>


            <label class="label">Username</label>
            <input type="email" class="input" placeholder="Enter Username" />
            <p class="text-primary">Default: admin</p>

            <label class="label">Password</label>
            <input type="password" class="input" placeholder="Enter Password" />
            <p class="text-primary">Default: admin123</p>

            <button class="btn btn-primary mt-2">Login</button>
        </fieldset>
    </main>

    <script src="js/login.js"></script>
</body>

</html>
