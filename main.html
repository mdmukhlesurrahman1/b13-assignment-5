<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Home</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- google font add -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome link -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind and daisyui add -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- custom css -->
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-base-300 min-h-screen">

    <!-- header section -->
    <header class="bg-base-100 sticky top-0 shadow-md mb-8 py-2 z-100">
        <nav class="w-11/12 mx-auto flex flex-col md:flex-row justify-between gap-4">
            <div class="logo flex items-center gap-2 justify-center">
                <img src="assets/github-logo.png" alt="" width="30px">
                <h1 class="text-xl md:text-2xl font-bold">GitHub Issues Tracker</h1>

            </div>
            <div class="search-section flex gap-2 items-center justify-center">
                <input id="search" type="text" placeholder="🔎︎ Search Issues..."
                    class="px-2 py-1 rounded border-base-300">
                <input id="searchBtn" type="submit" value="🔎︎ Search" class="btn btn-primary h-8">
            </div>

        </nav>
    </header>

    <main class="w-11/12 md:w-10/12 lg:w-9/12 mx-auto pb-8">

        <!-- sub menu section -->
        <section class="sticky top-26 md:top-14 z-50">
            <!-- all tabs -->
            <section class="bg-base-100 rounded-lg shadow-sm py-2 px-4 space-x-2 mb-2">

                <button onclick="switchTab('all')" id="all" class="btn btn-outline btn-primary w-20 h-8">All</button>
                <button onclick="switchTab('open')" id="open" class="btn btn-outline btn-primary w-20 h-8">Open</button>
                <button onclick="switchTab('closed')" id="closed"
                    class="btn btn-outline btn-primary w-20 h-8">Closed</button>

            </section>
            <!-- statistics -->
            <section class="bg-base-100 rounded-t-lg py-2 px-4 shadow-sm flex gap-4 justify-between">
                <div class="flex gap-1 items-center">
                    <img src="assets/Aperture.png" class="bg-base-300 p-1 rounded-full">
                    <div>
                        <h2 id="count" class="md:text-lg font-bold">0 issues</h2>
                        <p class="text-gray-500 text-xs md:text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex text-sm flex-col md:flex-row md:gap-4">
                    <div class="flex items-center gap-2">
                        <span class="bg-[#00A96E] p-1.5 rounded-full"></span> Open
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="bg-[#A855F7] p-1.5 rounded-full"></span> Closed
                    </div>
                </div>
            </section>

        </section>

        <button class="btn" onclick="my_modal_1.showModal()">open modal</button>
        <dialog id="my_modal_1" class="modal">
            <div class="modal-box">
                <h3 class="text-lg font-bold">${element.title}</h3>
                <div class="flex items-center gap-2 mt-2 mb-6">
                    <div class="badge badge-success rounded-full font-bold text-base-100">open</div>
                    <p class="text-sm text-gray-500">opend by sjsjsj • time</p>
                </div>
                <div class="flex flex-wrap gap-2 items-center">
                    <div class="badge badge-warning border-warning badge-soft rounded-full">bug</div>
                    <div class="badge badge-warning border-warning badge-soft rounded-full">bug</div>
                </div>
                <p class="text-sm text-gray-500 my-6">${element.description}</p>
                <div class="card grid grid-cols-2 p-4 bg-base-200">
                    <div class="space-y-2">
                        <p class="text-sm text-gray-500">Assignee:</p>
                        <p class="font-bold">Assignee name</p>
                    </div>
                    <div class="space-y-2">
                        <p class="text-sm text-gray-500">Priority:</p>
                        <div class="badge badge-error rounded-full font-bold text-base-100 uppercase">high</div>
                    </div>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary h-8">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

        <!-- loading spinner -->

        <div id="loading" class="bg-base-200 hidden items-center justify-center min-h-[40vh]">
            <span class="loading loading-infinity loading-xl"></span>
        </div>

        <!-- cards section -->
        <section id="cards"
            class="bg-base-200 rounded-b-lg shadow-md p-4 grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">

    </main>

    <script src="js/main.js"></script>
</body>
